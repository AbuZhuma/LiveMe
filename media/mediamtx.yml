logLevel: info
logDestinations: [stdout]

authMethod: http
authHTTPAddress: http://127.0.0.1:8080/internal/mtx-auth
authHTTPExclude:
  - action: api
  - action: metrics
  - action: pprof
  - action: publish
    path: ~^aac/
  - action: read
  - action: playback

api: true
apiAddress: 127.0.0.1:9997

metrics: false
pprof: false
playback: false
rtmp: false
srt: false
moq: false

rtsp: true
rtspAddress: 127.0.0.1:8554
rtspTransports: [tcp]
rtspEncryption: "no"

webrtc: true
webrtcAddress: 127.0.0.1:8889
webrtcEncryption: false
webrtcLocalUDPAddress: :8189
webrtcIPsFromInterfaces: true
webrtcAdditionalHosts: []

hls: true
hlsAddress: 127.0.0.1:8888
hlsVariant: lowLatency
hlsSegmentCount: 10
hlsSegmentDuration: 2s
hlsPartDuration: 500ms
hlsAlwaysRemux: true
hlsAllowOrigins: ["*"]
# «CDN-режим» для запросов с этим Bearer-заголовком (его ставит наш nginx на
# /aac/): отключает cookie-сессии зрителей HLS. Без этого нативный плеер
# iPhone не проносит куку через 302 cookie-check и получает 400 «HLS on iOS
# requires the server to set and read cookies» → чёрный экран (проверено).
# Это не секрет безопасности (read и так публичный), а переключатель режима.
hlsCDNSecret: liveme-edge

pathDefaults:
  record: false

paths:
  "live/main":
    source: publisher
    record: false
    runOnReady: ./media/scripts/on-ready.sh
    runOnReadyRestart: true

  "aac/main":
    source: publisher
    record: false
    runOnReady: curl -sS -m 3 -X POST http://127.0.0.1:8080/internal/hooks/ready
    runOnNotReady: curl -sS -m 3 -X POST http://127.0.0.1:8080/internal/hooks/notready
